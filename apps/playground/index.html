<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>choo-choo — playground</title>
  </head>
  <body>
    <header class="page-header">
      <h1>choo-choo</h1>
      <p>Railroad diagrams from EBNF.</p>
    </header>

    <main>
      <section class="panel">
        <h2>Grammar source</h2>
        <p class="hint">
          Pick a grammar format, edit the source, and choose a rule + compose mode.
        </p>

        <div class="controls">
          <label>
            Grammar
            <select id="grammar-select">
              <option value="ebnf">EBNF</option>
              <option value="antlr">ANTLR4</option>
              <option value="peg">PEG (peggy)</option>
              <option value="python-peg">Python PEG (pegen)</option>
            </select>
          </label>
          <label>
            Rule
            <select id="rule-select"></select>
          </label>
          <label>
            Compose
            <select id="compose-select">
              <option value="no">no</option>
              <option value="yes">yes</option>
              <option value="grouped">grouped</option>
            </select>
          </label>
          <label>
            Choice alignment
            <select id="choice-alignment-select">
              <option value="left">left</option>
              <option value="center">center</option>
            </select>
          </label>
          <label>
            Sizing
            <select id="sizing-select">
              <option value="intrinsic">intrinsic</option>
              <option value="fluid">fluid</option>
            </select>
          </label>
        </div>

        <textarea id="source" spellcheck="false" autocomplete="off"></textarea>

        <div class="output-wrapper">
          <choo-choo id="output"></choo-choo>
        </div>
      </section>

    </main>

    <footer class="page-footer">
      <p>
        The specification lives in <code>docs/</code>.
      </p>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
