<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>choo-choo — playground</title>
  </head>
  <body>
    <header class="page-header">
      <h1>choo-choo</h1>
      <p>Railroad diagrams from EBNF.</p>
    </header>

    <main>
      <section class="panel">
        <h2>EBNF source</h2>
        <p class="hint">
          Edit the grammar — pick a rule and a compose mode to see prior rules inlined.
        </p>

        <textarea id="ebnf-source" spellcheck="false" autocomplete="off"></textarea>

        <div class="controls">
          <label>
            Rule
            <select id="ebnf-rule"></select>
          </label>
          <label>
            Compose
            <select id="ebnf-compose">
              <option value="no">no</option>
              <option value="yes">yes</option>
              <option value="grouped">grouped</option>
            </select>
          </label>
        </div>

        <div class="output-wrapper">
          <choo-choo id="ebnf-output"></choo-choo>
        </div>
      </section>

    </main>

    <footer class="page-footer">
      <p>
        The specification lives in <code>docs/</code>.
      </p>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
